[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "stagehand-social"
version = "0.1.0"
description = "Stagehand-powered SDK for posting, commenting, liking, and logging into social platforms — and any website."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "stagehand-social-sdk contributors" }]
requires-python = ">=3.10"
keywords = [
    "stagehand",
    "browserbase",
    "social-media",
    "automation",
    "browser-automation",
    "instagram",
    "tiktok",
    "twitter",
    "facebook",
    "youtube",
    "linkedin",
    "threads",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP :: Browsers",
]

dependencies = [
    "stagehand>=0.4.0",
    "browserbase>=1.0.0",
    "pyotp>=2.9.0",
    "httpx>=0.27.0",
    "pydantic>=2.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.6.0",
    "mypy>=1.10.0",
]

[project.urls]
Homepage = "https://github.com/loveloud-creatives/stagehand-social-sdk"
Documentation = "https://github.com/loveloud-creatives/stagehand-social-sdk/tree/main/docs"
Repository = "https://github.com/loveloud-creatives/stagehand-social-sdk"
Issues = "https://github.com/loveloud-creatives/stagehand-social-sdk/issues"

[tool.setuptools.packages.find]
include = ["stagehand_social*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
